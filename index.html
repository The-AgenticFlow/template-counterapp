<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 3rem 4rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            min-width: 320px;
        }

        h1 {
            color: #333;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .counter-display {
            font-size: 5rem;
            font-weight: 700;
            color: #667eea;
            margin: 1.5rem 0;
            min-height: 7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter-display.loading {
            color: #999;
            font-size: 2rem;
        }

        .counter-display.error {
            color: #e74c3c;
            font-size: 1.5rem;
        }

        .buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        button {
            width: 80px;
            height: 80px;
            font-size: 2.5rem;
            font-weight: 600;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-increment {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-increment:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-increment:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn-decrement {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-decrement:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(245, 87, 108, 0.5);
        }

        .btn-decrement:active:not(:disabled) {
            transform: scale(0.95);
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Counter App</h1>
        <div id="counter" class="counter-display loading">Loading...</div>
        <div class="buttons">
            <button id="decrement" class="btn-decrement" disabled aria-label="Decrement counter">−</button>
            <button id="increment" class="btn-increment" disabled aria-label="Increment counter">+</button>
        </div>
        <div id="error" class="error-message"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api/counter';
        
        const counterEl = document.getElementById('counter');
        const incrementBtn = document.getElementById('increment');
        const decrementBtn = document.getElementById('decrement');
        const errorEl = document.getElementById('error');

        let isLoading = false;

        function setLoading(loading) {
            isLoading = loading;
            incrementBtn.disabled = loading;
            decrementBtn.disabled = loading;
            
            if (loading && !counterEl.classList.contains('error')) {
                counterEl.classList.add('loading');
            } else {
                counterEl.classList.remove('loading');
            }
        }

        function showError(message) {
            errorEl.textContent = message;
            errorEl.classList.add('visible');
            counterEl.classList.add('error');
            counterEl.textContent = 'Error';
        }

        function hideError() {
            errorEl.classList.remove('visible');
            counterEl.classList.remove('error');
        }

        function updateCounter(count) {
            hideError();
            counterEl.classList.remove('loading');
            counterEl.textContent = count;
        }

        async function fetchCounter() {
            setLoading(true);
            hideError();
            
            try {
                const response = await fetch(API_BASE);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                updateCounter(data.count);
            } catch (error) {
                console.error('Failed to fetch counter:', error);
                showError(`Failed to load counter: ${error.message}`);
            } finally {
                setLoading(false);
            }
        }

        async function increment() {
            if (isLoading) return;
            
            setLoading(true);
            hideError();
            
            try {
                const response = await fetch(`${API_BASE}/increment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                updateCounter(data.count);
            } catch (error) {
                console.error('Failed to increment:', error);
                showError(`Failed to increment: ${error.message}`);
            } finally {
                setLoading(false);
            }
        }

        async function decrement() {
            if (isLoading) return;
            
            setLoading(true);
            hideError();
            
            try {
                const response = await fetch(`${API_BASE}/decrement`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                updateCounter(data.count);
            } catch (error) {
                console.error('Failed to decrement:', error);
                showError(`Failed to decrement: ${error.message}`);
            } finally {
                setLoading(false);
            }
        }

        // Event listeners
        incrementBtn.addEventListener('click', increment);
        decrementBtn.addEventListener('click', decrement);

        // Initial fetch
        fetchCounter();
    </script>
</body>
</html>
