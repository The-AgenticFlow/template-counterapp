<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Counter App</h1>
            <p class="subtitle">A simple counter with increment and decrement</p>
        </header>
        
        <main class="counter-card">
            <div class="status-indicator" id="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text" id="status-text">Checking connection...</span>
            </div>
            
            <div class="counter-display">
                <span class="counter-value" id="counter-value">-</span>
            </div>
            
            <div class="counter-controls">
                <button class="btn btn-decrement" id="btn-decrement" disabled>
                    <span class="btn-icon">−</span>
                    <span class="btn-label">Decrement</span>
                </button>
                <button class="btn btn-increment" id="btn-increment" disabled>
                    <span class="btn-icon">+</span>
                    <span class="btn-label">Increment</span>
                </button>
            </div>
            
            <div class="loading-overlay" id="loading-overlay">
                <div class="spinner"></div>
            </div>
        </main>
        
        <footer>
            <p class="api-info">
                <span id="api-status">API: </span>
                <a href="#" id="api-link" target="_blank"></a>
            </p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
